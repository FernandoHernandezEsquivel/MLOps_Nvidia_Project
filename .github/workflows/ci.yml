# .github/workflows/ci.yml
name: CI - Pruebas Automáticas

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Clonar código
      uses: actions/checkout@v4  # ✅ Actualizado a v4
    
    - name: Configurar Python
      uses: actions/setup-python@v5  # ✅ Actualizado a v5
      with:
        python-version: '3.9'
    
    - name: Instalar dependencias
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Verificar calidad de código
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Ejecutar pruebas
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Subir cobertura
      uses: codecov/codecov-action@v4  # ✅ Actualizado a v4
      with:
        file: ./coverage.xml
